<!DOCTYPE html>
<html>

<head>

<title>Confirmed Flights</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>


<body>

<div class="container mt-5">

<h2 class="text-center mb-4">
Confirmed Flights
</h2>


<table class="table table-bordered">

<thead class="table-success">

<tr>
<th>ID</th>
<th>Name</th>
<th>Email</th>
<th>Tickets</th>
<th>Booking Date</th>
</tr>

</thead>


<tbody>

{% for booking in bookings %}

<tr>

<td>{{ booking[0] }}</td>

<td>{{ booking[1] }}</td>

<td>{{ booking[2] }}</td>

<td>{{ booking[3] }}</td>

<td>{{ booking[4] }}</td>

</tr>

{% endfor %}

</tbody>


</table>


</div>

</body>

</html>
