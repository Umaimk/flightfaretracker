<!DOCTYPE html>
<html>

<head>

<title>
Flight Booking
</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>


<body>


<div class="container mt-5">


<h2 class="text-center">
Complete Your Booking
</h2>
<div class="card shadow mb-4">

    <div class="card-body">

        <h3 class="text-center">

            Selected Flight

        </h3>

        <table class="table">

            <tr>

                <th>Airline</th>

                <td>{{ airline }}</td>

            </tr>

            <tr>

                <th>Price</th>

                <td>${{ price }}</td>

            </tr>

        </table>

    </div>

</div>

<form method="POST" action="/confirm_booking">

<input type="hidden" name="airline" value="{{ airline }}">

<input type="hidden" name="price" value="{{ price }}">


<div class="mb-3">

<label>
Passenger Name
</label>

<input 
type="text"
name="name"
class="form-control"
required>

</div>



<div class="mb-3">

<label>
Email
</label>

<input 
type="email"
name="email"
class="form-control"
required>

</div>



<div class="mb-3">

<label>
Number of Tickets
</label>

<input 
type="number"
name="tickets"
class="form-control"
value="1"
min="1">

</div>


<button class="btn btn-primary">

Confirm Booking

</button>


</form>


</div>


</body>

</html>
