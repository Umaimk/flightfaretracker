<!DOCTYPE html>

<html>

<head>

<title>
Booking Confirmed
</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>


<body>


<div class="container mt-5">

    <div class="card shadow p-4">

        <h1 class="text-success text-center">
            Booking Confirmed! ✅
        </h1>

        <p class="text-center">
            Thank you for booking with AI Flight Tracker.
        </p>

        <table class="table table-bordered mt-4">

            <tr>
                <th>Passenger</th>
                <td>{{ name }}</td>
            </tr>

            <tr>
                <th>Email</th>
                <td>{{ email }}</td>
            </tr>

            <tr>
                <th>Airline</th>
                <td>{{ airline }}</td>
            </tr>

            <tr>
                <th>Fare</th>
                <td>${{ price }}</td>
            </tr>

            <tr>
                <th>Tickets</th>
                <td>{{ tickets }}</td>
            </tr>

        </table>

        <div class="text-center mt-4">

            <a href="/bookings" class="btn btn-success">
                View Confirmed Flights
            </a>

            <a href="/" class="btn btn-primary">
                Back Home
            </a>

        </div>

    </div>

</div>

</body>

</html>
